{{- if (include "host.allowlist_waiter.enabled" .) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "host.allowlist_waiter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shield.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: "pre-install,pre-upgrade"
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: {{ .Values.gke_autopilot.allowlist_waiter.active_deadline_seconds }}
  template:
    metadata:
      name: {{ include "host.allowlist_waiter.fullname" . }}
      labels:
        {{- /* Must stay shield.labels — do NOT switch to host.labels: that set
               carries cloud.google.com/matching-allowlist, which would make GKE
               Autopilot block this Pod on the very allowlist it is waiting to
               load. */}}
        {{- include "shield.labels" . | nindent 8 }}
      {{- with .Values.pod_annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "host.allowlist_waiter.service_account_name" . }}
      securityContext:
        {{- toYaml .Values.gke_autopilot.allowlist_waiter.pod_security_context | nindent 8 }}
      {{- with .Values.gke_autopilot.allowlist_waiter.image.pull_secrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wait-for-allowlist
          image: {{ include "host.allowlist_waiter.image" . | replace " " "" }}
          imagePullPolicy: {{ .Values.gke_autopilot.allowlist_waiter.image.pull_policy }}
          securityContext:
            {{- toYaml .Values.gke_autopilot.allowlist_waiter.security_context | nindent 12 }}
          command:
            - /bin/bash
            - -c
            - |
              set -uo pipefail
              NAMESPACE={{ .Release.Namespace }}
              SYNC_NAME=sysdig-agent-allowlist-synchronizer
              TIMEOUT={{ .Values.gke_autopilot.allowlist_waiter.timeout }}

              echo "Waiting for AllowlistSynchronizer/$SYNC_NAME to become Ready (timeout $TIMEOUT)..."
              kubectl wait --for=condition=Ready \
                allowlistsynchronizer/"$SYNC_NAME" \
                -n "$NAMESPACE" \
                --timeout="$TIMEOUT"
              ec=$?

              if [ "$ec" -ne 0 ]; then
                echo "---" >&2
                echo "kubectl wait failed (exit $ec). Dumping AllowlistSynchronizer state for diagnostics:" >&2
                kubectl describe -n "$NAMESPACE" allowlistsynchronizer/"$SYNC_NAME" >&2 || true
                echo "---" >&2
                kubectl get -n "$NAMESPACE" allowlistsynchronizer/"$SYNC_NAME" -o yaml >&2 || true
                exit "$ec"
              fi
              echo "AllowlistSynchronizer is Ready."
          resources:
            {{- toYaml .Values.gke_autopilot.allowlist_waiter.resources | nindent 12 }}
{{- end -}}
