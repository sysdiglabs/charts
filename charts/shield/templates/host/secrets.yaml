{{- if and (include "host.rapid_response_enabled" .) (not (include "host.rapid_response_password_existing_secret" .)) }}
{{- if not (trim (include "host.rapid_response_password" .)) }}
{{- fail "features.respond.rapid_response is enabled but no password is set. Rapid Response requires a password: set features.respond.rapid_response.password, or reference a pre-created Secret with features.respond.rapid_response.password_existing_secret (and optionally .password_existing_secret_key)." }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "host.rapid_response_password_secret" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "host.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ (include "host.rapid_response_password" .) | b64enc | quote }}
{{- end }}

{{- if and .Values.features.investigations.event_forwarder.enabled (eq .Values.features.investigations.event_forwarder.existing_secret "") }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "host.local_forwarder_secret_name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "host.labels" . | nindent 4 }}
data:
  local_forwarder_config.yaml: {{ pick .Values.features.investigations.event_forwarder "integrations" | toYaml | b64enc | quote }}
{{- end }}
