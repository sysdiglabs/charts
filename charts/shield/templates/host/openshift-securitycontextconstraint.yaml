{{- if or (.Capabilities.APIVersions.Has "security.openshift.io/v1") (has "security.openshift.io/v1" .Values.extra_capabilities_api_versions) }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  annotations:
    kubernetes.io/description: |
      This provides the minimum requirements to the Sysdig Shield to run in the Openshift.
    {{- $shieldAnnotations := (include "shield.annotations" .) }}
    {{- if $shieldAnnotations }}
    {{- $shieldAnnotations | nindent 4 }}
    {{- end }}
  name: {{ include "host.fullname" . }}
  labels:
    {{- include "host.labels" . | nindent 4 }}
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: true
allowHostPorts: {{ or .Values.features.posture.host_posture.enabled (dig "prometheus_exporter" "enabled" false .Values.host.additional_settings) (dig "kspm_analyzer" "enabled" false .Values.host.additional_settings) }}
allowPrivilegeEscalation: {{ .Values.host.privileged }}
allowPrivilegedContainer: {{ .Values.host.privileged }}
{{- if .Values.host.privileged }}
allowedCapabilities: []
{{- else }}
allowedCapabilities:
  {{- include "host.capabilities" . | nindent 2 }}
{{- end }}
defaultAddCapabilities: []
fsGroup:
  type: RunAsAny
groups: []
priority: 0
readOnlyRootFilesystem: false
requiredDropCapabilities: []
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
- '*'
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:{{ .Release.Namespace }}:{{ include "host.service_account_name" . }}
volumes:
- configMap
- downwardAPI
- emptyDir
- hostPath
- secret
{{- end }}
