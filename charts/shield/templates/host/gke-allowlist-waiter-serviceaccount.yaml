{{- if (include "host.allowlist_waiter.enabled" .) -}}
{{- if (include "host.allowlist_waiter.rbac.service_account.create" .) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "host.allowlist_waiter.service_account_name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "host.rbac_labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: "pre-install,pre-upgrade"
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: "before-hook-creation"
    {{- $rbacAnnotations := (include "host.rbac_annotations" .) }}
    {{- if $rbacAnnotations }}
    {{- $rbacAnnotations | nindent 4 }}
    {{- end }}
{{- end }}
{{- end -}}
