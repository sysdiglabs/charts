{{- if (include "cluster.rbac.service_account.create" .) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cluster.service_account_name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster.rbac_labels" . | nindent 4 }}
  {{- $rbacAnnotations := (include "cluster.rbac_annotations" .) }}
  {{- if $rbacAnnotations }}
  annotations:
    {{- $rbacAnnotations | nindent 4 }}
  {{- end }}
{{- end }}
