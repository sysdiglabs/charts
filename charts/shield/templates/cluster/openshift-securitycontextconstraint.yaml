{{- if or (.Capabilities.APIVersions.Has "security.openshift.io/v1") (has "security.openshift.io/v1" .Values.extra_capabilities_api_versions) }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  annotations:
    kubernetes.io/description: |
      This provides the minimum requirements to the Sysdig Shield to run in the Openshift.
    {{- $clusterAnnotations := (include "cluster.annotations" .) }}
    {{- if $clusterAnnotations }}
    {{- $clusterAnnotations | nindent 4 }}
    {{- end }}
  name: {{ include "cluster.fullname" . }}
  labels:
    {{- include "cluster.labels" . | nindent 4 }}
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: true
allowHostPorts: {{ .Values.cluster.host_network }}
{{- $clusterPrivileged := not (include "cluster.is_single_process_mode" .) }}
allowPrivilegeEscalation: {{ $clusterPrivileged }}
allowPrivilegedContainer: {{ $clusterPrivileged }}
allowedCapabilities: []
defaultAddCapabilities: []
fsGroup:
  type: RunAsAny
groups: []
priority: 0
readOnlyRootFilesystem: false
requiredDropCapabilities: []
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
- '*'
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:{{ .Release.Namespace }}:{{ include "cluster.service_account_name" . }}
volumes:
- configMap
- downwardAPI
- emptyDir
- hostPath
- secret
{{- end }}
