suite: Common - NOTES.txt credentials warning
templates:
  - templates/NOTES.txt
release:
  name: release-name
  namespace: shield-namespace
tests:
  - it: Emits the security notice when access_key is supplied inline
    set:
      cluster_config:
        name: test-cluster
      sysdig_endpoint:
        region: custom
        api_url: https://www.example.com
        collector:
          host: example.com
          port: 6443
        access_key: "fake-access-key"
    asserts:
      - matchRegexRaw:
          pattern: "SECURITY NOTICE"
      - matchRegexRaw:
          pattern: "sysdig_endpoint\\.access_key"

  - it: Emits the security notice when secure_api_token is supplied inline (with access_key via existing secret)
    set:
      cluster_config:
        name: test-cluster
      sysdig_endpoint:
        region: custom
        api_url: https://www.example.com
        collector:
          host: example.com
          port: 6443
        access_key_existing_secret: external-access-key
        secure_api_token: "fake-token"
    asserts:
      - matchRegexRaw:
          pattern: "SECURITY NOTICE"
      - matchRegexRaw:
          pattern: "sysdig_endpoint\\.secure_api_token"
      - notMatchRegexRaw:
          pattern: "- sysdig_endpoint\\.access_key"

  - it: Lists both keys when both are supplied inline
    set:
      cluster_config:
        name: test-cluster
      sysdig_endpoint:
        region: custom
        api_url: https://www.example.com
        collector:
          host: example.com
          port: 6443
        access_key: "fake-access-key"
        secure_api_token: "fake-token"
    asserts:
      - matchRegexRaw:
          pattern: "sysdig_endpoint\\.access_key"
      - matchRegexRaw:
          pattern: "sysdig_endpoint\\.secure_api_token"

  - it: Suppresses the notice when access_key uses existing_secret reference
    set:
      cluster_config:
        name: test-cluster
      sysdig_endpoint:
        region: custom
        api_url: https://www.example.com
        collector:
          host: example.com
          port: 6443
        access_key_existing_secret: external-access-key
        secure_api_token_existing_secret: external-api-token
    asserts:
      - notMatchRegexRaw:
          pattern: "SECURITY NOTICE"

  - it: Mentions only access_key bullet when access_key is inline and secure_api_token is existing_secret
    set:
      cluster_config:
        name: test-cluster
      sysdig_endpoint:
        region: custom
        api_url: https://www.example.com
        collector:
          host: example.com
          port: 6443
        access_key: "fake-access-key"
        secure_api_token_existing_secret: external-api-token
    asserts:
      - matchRegexRaw:
          pattern: "SECURITY NOTICE"
      - matchRegexRaw:
          pattern: "- sysdig_endpoint\\.access_key"
      - notMatchRegexRaw:
          pattern: "- sysdig_endpoint\\.secure_api_token"
