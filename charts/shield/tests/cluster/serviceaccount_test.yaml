suite: Cluster - ServiceAccount
templates:
  - templates/cluster/serviceaccount.yaml
chart:
  version: 1.2.3-helmtest
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Renders the ServiceAccount by default
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace

  - it: cluster.rbac.create false renders no ServiceAccount
    set:
      cluster:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: cluster.rbac.service_account.create false suppresses only the ServiceAccount
    set:
      cluster:
        rbac:
          service_account:
            create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: cluster.rbac.service_account.create true overrides rbac.create false
    set:
      cluster:
        rbac:
          create: false
          service_account:
            create: true
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: release-name-shield-cluster

  - it: Honors cluster.rbac.service_account_name override
    set:
      cluster:
        rbac:
          service_account_name: my-existing-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-existing-sa

  - it: Default labels present on ServiceAccount
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            helm.sh/chart: shield-1.2.3-helmtest
            app.kubernetes.io/name: shield
            app.kubernetes.io/instance: release-name
            app.kubernetes.io/version: "1.0.0"
            app.kubernetes.io/managed-by: Helm
            sysdig/component: cluster

  - it: No annotations by default on ServiceAccount
    asserts:
      - exists:
          path: metadata.annotations
        not: true

  - it: Applies rbac.labels and rbac.annotations to the ServiceAccount
    set:
      cluster:
        rbac:
          labels:
            app.kubernetes.io/name: shield
          annotations:
            app.kubernetes.io/description: "This is a test"
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: shield
      - isSubset:
          path: metadata.annotations
          content:
            app.kubernetes.io/description: "This is a test"

  - it: Global labels applied to ServiceAccount
    set:
      labels:
        global-label-key: global-label-value
    asserts:
      - equal:
          path: metadata.labels["global-label-key"]
          value: global-label-value

  - it: Global annotations applied to ServiceAccount
    set:
      annotations:
        global-annotation-key: global-annotation-value
    asserts:
      - equal:
          path: metadata.annotations["global-annotation-key"]
          value: global-annotation-value

  - it: Global annotations merged with rbac.annotations on ServiceAccount
    set:
      annotations:
        global-key: global-value
      cluster:
        rbac:
          annotations:
            rbac-key: rbac-value
    asserts:
      - equal:
          path: metadata.annotations["global-key"]
          value: global-value
      - equal:
          path: metadata.annotations["rbac-key"]
          value: rbac-value

  - it: cluster.annotations applied to ServiceAccount
    set:
      cluster:
        annotations:
          cluster-annotation-key: cluster-annotation-value
    asserts:
      - equal:
          path: metadata.annotations["cluster-annotation-key"]
          value: cluster-annotation-value

  - it: cluster.annotations merged with global and rbac annotations on ServiceAccount
    set:
      annotations:
        global-key: global-value
      cluster:
        annotations:
          cluster-key: cluster-value
        rbac:
          annotations:
            rbac-key: rbac-value
    asserts:
      - equal:
          path: metadata.annotations["global-key"]
          value: global-value
      - equal:
          path: metadata.annotations["cluster-key"]
          value: cluster-value
      - equal:
          path: metadata.annotations["rbac-key"]
          value: rbac-value

  - it: cluster.labels applied to ServiceAccount
    set:
      cluster:
        labels:
          cluster-label-key: cluster-label-value
    asserts:
      - equal:
          path: metadata.labels["cluster-label-key"]
          value: cluster-label-value

  - it: cluster.labels merged with global labels on ServiceAccount
    set:
      labels:
        global-key: global-value
      cluster:
        labels:
          cluster-key: cluster-value
    asserts:
      - equal:
          path: metadata.labels["global-key"]
          value: global-value
      - equal:
          path: metadata.labels["cluster-key"]
          value: cluster-value
