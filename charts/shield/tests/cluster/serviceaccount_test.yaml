suite: Cluster - ServiceAccount
templates:
  - templates/cluster/serviceaccount.yaml
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Renders the ServiceAccount by default
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace

  - it: cluster.rbac.create false renders no ServiceAccount
    set:
      cluster:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: cluster.rbac.service_account.create false suppresses only the ServiceAccount
    set:
      cluster:
        rbac:
          service_account:
            create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: cluster.rbac.service_account.create true overrides rbac.create false
    set:
      cluster:
        rbac:
          create: false
          service_account:
            create: true
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: release-name-shield-cluster

  - it: Honors cluster.rbac.service_account_name override
    set:
      cluster:
        rbac:
          service_account_name: my-existing-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-existing-sa

  - it: Applies rbac.labels and rbac.annotations to the ServiceAccount
    set:
      cluster:
        rbac:
          labels:
            app.kubernetes.io/name: shield
          annotations:
            app.kubernetes.io/description: "This is a test"
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: shield
      - isSubset:
          path: metadata.annotations
          content:
            app.kubernetes.io/description: "This is a test"

  - it: Global annotations applied to ServiceAccount
    set:
      annotations:
        global-annotation-key: global-annotation-value
    asserts:
      - equal:
          path: metadata.annotations["global-annotation-key"]
          value: global-annotation-value

  - it: Global annotations merged with rbac.annotations on ServiceAccount
    set:
      annotations:
        global-key: global-value
      cluster:
        rbac:
          annotations:
            rbac-key: rbac-value
    asserts:
      - equal:
          path: metadata.annotations["global-key"]
          value: global-value
      - equal:
          path: metadata.annotations["rbac-key"]
          value: rbac-value
