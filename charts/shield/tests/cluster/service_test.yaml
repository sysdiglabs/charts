suite: Cluster - Service
templates:
  - templates/cluster/service.yaml
chart:
  version: 1.2.3-helmtest
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Default Monitoring Port
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - notExists:
          path: metadata.annotations
      - equal:
          path: metadata.namespace
          value: shield-namespace
      - equal:
          path: spec.type
          value: ClusterIP
      - isNotNullOrEmpty:
          path: .spec.ports[?(@.name == "monitoring")]
      - equal:
          path: spec.ports[?(@.name == "monitoring")].port
          value: 8080
      - equal:
          path: spec.ports[?(@.name == "monitoring")].protocol
          value: TCP
      - equal:
          path: spec.ports[?(@.name == "monitoring")].targetPort
          value: monitoring
      - lengthEqual:
          path: spec.ports
          count: 1
      - equal:
          path: metadata.labels["sysdig/component"]
          value: cluster

  - it: Custom Monitoring Port
    set:
      cluster:
        additional_settings:
          monitoring_port: 8081
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace
      - equal:
          path: spec.type
          value: ClusterIP
      - isNotNullOrEmpty:
          path: .spec.ports[?(@.name == "monitoring")]
      - equal:
          path: spec.ports[?(@.name == "monitoring")].port
          value: 8081
      - equal:
          path: spec.ports[?(@.name == "monitoring")].protocol
          value: TCP
      - equal:
          path: spec.ports[?(@.name == "monitoring")].targetPort
          value: monitoring
      - lengthEqual:
          path: spec.ports
          count: 1
      - equal:
          path: metadata.labels["sysdig/component"]
          value: cluster

  - it: Default Audit Port
    set:
      features:
        detections:
          kubernetes_audit:
            enabled: true
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace
      - equal:
          path: spec.type
          value: ClusterIP
      - isNotNullOrEmpty:
          path: .spec.ports[?(@.name == "audit")]
      - equal:
          path: spec.ports[?(@.name == "audit")].port
          value: 6443
      - equal:
          path: spec.ports[?(@.name == "audit")].protocol
          value: TCP
      - equal:
          path: spec.ports[?(@.name == "audit")].targetPort
          value: audit
      - lengthEqual:
          path: spec.ports
          count: 2
      - equal:
          path: metadata.labels["sysdig/component"]
          value: cluster

  - it: Custom Audit Port
    set:
      features:
        detections:
          kubernetes_audit:
            enabled: true
            http_port: 6444
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace
      - equal:
          path: spec.type
          value: ClusterIP
      - isNotNullOrEmpty:
          path: .spec.ports[?(@.name == "audit")]
      - equal:
          path: spec.ports[?(@.name == "audit")].port
          value: 6444
      - equal:
          path: spec.ports[?(@.name == "audit")].protocol
          value: TCP
      - equal:
          path: spec.ports[?(@.name == "audit")].targetPort
          value: audit
      - lengthEqual:
          path: spec.ports
          count: 2
      - equal:
          path: metadata.labels["sysdig/component"]
          value: cluster

  - it: Default Admission Control Port
    set:
      features:
        admission_control:
          enabled: true
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace
      - equal:
          path: spec.type
          value: ClusterIP
      - isNotNullOrEmpty:
          path: .spec.ports[?(@.name == "ac")]
      - equal:
          path: spec.ports[?(@.name == "ac")].port
          value: 8443
      - equal:
          path: spec.ports[?(@.name == "ac")].protocol
          value: TCP
      - equal:
          path: spec.ports[?(@.name == "ac")].targetPort
          value: ac
      - lengthEqual:
          path: spec.ports
          count: 2
      - equal:
          path: metadata.labels["sysdig/component"]
          value: cluster

  - it: Custom Admission Control Port
    set:
      features:
        admission_control:
          enabled: true
          http_port: 1234
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: metadata.namespace
          value: shield-namespace
      - equal:
          path: spec.type
          value: ClusterIP
      - isNotNullOrEmpty:
          path: .spec.ports[?(@.name == "ac")]
      - equal:
          path: spec.ports[?(@.name == "ac")].port
          value: 1234
      - equal:
          path: spec.ports[?(@.name == "ac")].protocol
          value: TCP
      - equal:
          path: spec.ports[?(@.name == "ac")].targetPort
          value: ac
      - lengthEqual:
          path: spec.ports
          count: 2
      - equal:
          path: metadata.labels["sysdig/component"]
          value: cluster

  - it: Service setup with different service type
    set:
      cluster:
        service:
          type: NodePort
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: release-name-shield-cluster
      - equal:
          path: spec.type
          value: NodePort

  - it: Default labels present on Service
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            helm.sh/chart: shield-1.2.3-helmtest
            app.kubernetes.io/name: shield
            app.kubernetes.io/instance: release-name
            app.kubernetes.io/version: "1.0.0"
            app.kubernetes.io/managed-by: Helm
            sysdig/component: cluster

  - it: Custom Lables
    set:
      cluster:
        service:
          labels:
            custom-1: label-1
            custom-2: label-2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: release-name-shield-cluster
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: shield
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: release-name
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["custom-1"]
          value: label-1
      - equal:
          path: metadata.labels["custom-2"]
          value: label-2

  - it: Custom Annotations
    set:
      cluster:
        service:
          annotations:
            custom-1: annotation-1
            custom-2: annotation-2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: release-name-shield-cluster
      - exists:
          path: metadata.annotations
      - equal:
          path: metadata.annotations["custom-1"]
          value: annotation-1
      - equal:
          path: metadata.annotations["custom-2"]
          value: annotation-2

  - it: Global labels applied to Service
    set:
      labels:
        global-label-key: global-label-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.labels["global-label-key"]
          value: global-label-value

  - it: Global annotations applied to Service
    set:
      annotations:
        global-annotation-key: global-annotation-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.annotations["global-annotation-key"]
          value: global-annotation-value

  - it: Global annotations merged with service annotations
    set:
      annotations:
        global-key: global-value
      cluster:
        service:
          annotations:
            service-key: service-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.annotations["global-key"]
          value: global-value
      - equal:
          path: metadata.annotations["service-key"]
          value: service-value

  - it: cluster.annotations applied to Service
    set:
      cluster:
        annotations:
          cluster-annotation-key: cluster-annotation-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.annotations["cluster-annotation-key"]
          value: cluster-annotation-value

  - it: cluster.annotations merged with global and service annotations on Service
    set:
      annotations:
        global-key: global-value
      cluster:
        annotations:
          cluster-key: cluster-value
        service:
          annotations:
            service-key: service-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.annotations["global-key"]
          value: global-value
      - equal:
          path: metadata.annotations["cluster-key"]
          value: cluster-value
      - equal:
          path: metadata.annotations["service-key"]
          value: service-value

  - it: cluster.labels applied to Service
    set:
      cluster:
        labels:
          cluster-label-key: cluster-label-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.labels["cluster-label-key"]
          value: cluster-label-value

  - it: cluster.labels merged with global labels on Service
    set:
      labels:
        global-key: global-value
      cluster:
        labels:
          cluster-key: cluster-value
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.labels["global-key"]
          value: global-value
      - equal:
          path: metadata.labels["cluster-key"]
          value: cluster-value

  - it: cluster.annotations overrides global annotations on Service
    set:
      annotations:
        env: global
      cluster:
        annotations:
          env: cluster
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.annotations["env"]
          value: cluster

  - it: cluster.labels overrides global labels on Service
    set:
      labels:
        env: global
      cluster:
        labels:
          env: cluster
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.labels["env"]
          value: cluster
