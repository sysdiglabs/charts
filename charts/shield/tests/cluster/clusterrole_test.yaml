suite: Cluster - ClusterRole
templates:
  - templates/cluster/clusterrole.yaml
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Default Role
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
              - replicationcontrollers
              - services
              - events
              - limitranges
              - namespaces
              - nodes
              - resourcequotas
              - persistentvolumes
              - persistentvolumeclaims
              - configmaps
              - secrets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - autoscaling
            resources:
              - horizontalpodautoscalers
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - ingresses
              - networkpolicies
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - storage.k8s.io
            resources:
              - storageclasses
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - certificates.k8s.io
            resources:
              - certificatesigningrequests
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - policy
            resources:
              - poddisruptionbudgets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - discovery.k8s.io
            resources:
              - endpointslices
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - events.k8s.io
            resources:
              - events
            verbs:
              - get
              - list
              - watch

  - it: Audit
    set:
      features:
        detections:
          kubernetes_audit:
            enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resourceNames:
              - kube-system
            resources:
              - namespaces
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - deployments
              - replicasets
              - statefulsets
              - daemonsets
            verbs:
              - get

  - it: Container Vulnerability Management
    set:
      features:
        vulnerability_management:
          container_vulnerability_management:
            enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
              - nodes
              - pods
              - replicationcontrollers
              - secrets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - extensions
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch

  - it: Test network_security enabled
    set:
      features:
        investigations:
          network_security:
            enabled: true
    asserts:
      - isKind:
          of: ClusterRole
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - ingresses
              - networkpolicies
            verbs:
              - get
              - list
              - watch

  - it: Posture
    set:
      features:
        posture:
          cluster_posture:
            enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - configmaps
              - events
              - limitranges
              - namespaces
              - nodes
              - persistentvolumeclaims
              - persistentvolumes
              - pods
              - pods/log
              - replicationcontrollers
              - resourcequotas
              - secrets
              - serviceaccounts
              - services
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - controllerrevisions
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - autoscaling
            resources:
              - horizontalpodautoscalers
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - config.openshift.io
            resources:
              - clusterversions
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - extensions
            resources:
              - daemonsets
              - deployments
              - ingresses
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - ingresses
              - ingressclasses
              - networkpolicies
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - policy
            resources:
              - podsecuritypolicies
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterroles
              - clusterrolebindings
              - roles
              - rolebindings
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - storage.k8s.io
            resources:
              - storageclasses
              - volumeattachments
            verbs:
              - get
              - list
              - watch

  - it: Admission Control with Container Vulnerability Management
    set:
      features:
        admission_control:
          enabled: true
          container_vulnerability_management:
            enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
              - nodes
              - pods
              - replicationcontrollers
              - secrets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - extensions
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
              - configmaps
              - secrets
              - serviceaccounts
              - namespaces
            verbs:
              - get
  - it: Admission Control with Image Signature
    set:
      features:
        admission_control:
          enabled: true
          supply_chain:
            enabled: true
            image_signature:
              enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
              - configmaps
              - secrets
              - serviceaccounts
              - namespaces
            verbs:
              - get
  - it: Kubernetes Metadata
    set:
      features:
        kubernetes_metadata:
          enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
              - replicationcontrollers
              - services
              - events
              - limitranges
              - namespaces
              - nodes
              - resourcequotas
              - persistentvolumes
              - persistentvolumeclaims
              - configmaps
              - secrets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - autoscaling
            resources:
              - horizontalpodautoscalers
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - ingresses
              - networkpolicies
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - storage.k8s.io
            resources:
              - storageclasses
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - certificates.k8s.io
            resources:
              - certificatesigningrequests
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - policy
            resources:
              - poddisruptionbudgets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - discovery.k8s.io
            resources:
              - endpointslices
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - events.k8s.io
            resources:
              - events
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch

  - it: Test response_actions enabled
    set:
      features:
        respond:
          response_actions:
            enabled: true
    asserts:
      - isKind:
          of: ClusterRole
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - jobs
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - statefulsets
            verbs:
              - get
              - update
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - delete
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - statefulsets
              - replicasets
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - create
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - get
              - delete
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - statefulsets
              - replicasets
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/log
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - statefulsets
              - replicasets
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - snapshot.storage.k8s.io
            resources:
              - volumesnapshots
            verbs:
              - create
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - snapshot.storage.k8s.io
            resources:
              - volumesnapshots
            verbs:
              - delete
              - get
              - watch
              - patch
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch

  - it: response_actions disabled by default does not leak per-action RBAC
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - delete
              - get
      - notContains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - get
              - delete
      - notContains:
          path: rules
          content:
            apiGroups:
              - snapshot.storage.k8s.io
            resources:
              - volumesnapshots
            verbs:
              - delete
              - get
              - watch
              - patch
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/log
            verbs:
              - get

  - it: cluster.rbac.create false renders no ClusterRole
    set:
      cluster:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: cluster.rbac.cluster_role.create false suppresses the ClusterRole even when rbac.create is true
    set:
      cluster:
        rbac:
          cluster_role:
            create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: cluster.rbac.cluster_role.create true overrides rbac.create false
    set:
      cluster:
        rbac:
          create: false
          cluster_role:
            create: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster

  - it: cluster.rbac.create false with response_actions enabled still renders no ClusterRole
    set:
      cluster:
        rbac:
          create: false
      features:
        respond:
          response_actions:
            enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: response_actions enabled with delete_pod trigger none suppresses only delete_pod rule
    set:
      features:
        respond:
          response_actions:
            enabled: true
            delete_pod:
              trigger: none
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - delete
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - get
              - delete
      - contains:
          path: rules
          content:
            apiGroups:
              - snapshot.storage.k8s.io
            resources:
              - volumesnapshots
            verbs:
              - delete
              - get
              - watch
              - patch

  - it: Posture OCP routes enabled
    set:
      features:
        posture:
          cluster_posture:
            enabled: true
      cluster:
        additional_settings:
          kspm_collector:
            ocp_route_enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - route.openshift.io
            resources:
              - routes
            verbs:
              - get
              - list
              - watch
      - notContains:
          path: rules
          content:
            apiGroups:
              - apps.openshift.io
            resources:
              - deploymentconfigs

  - it: Posture OCP routes not granted when posture disabled
    set:
      features:
        posture:
          cluster_posture:
            enabled: false
      cluster:
        additional_settings:
          kspm_collector:
            ocp_route_enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - notContains:
          path: rules
          content:
            apiGroups:
              - route.openshift.io
            resources:
              - routes

  - it: Posture OCP deploymentconfigs enabled
    set:
      features:
        posture:
          cluster_posture:
            enabled: true
      cluster:
        additional_settings:
          kspm_collector:
            ocp_deploymentconfig_enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - apps.openshift.io
            resources:
              - deploymentconfigs
            verbs:
              - get
              - list
              - watch
      - notContains:
          path: rules
          content:
            apiGroups:
              - route.openshift.io
            resources:
              - routes

  - it: Posture OCP deploymentconfigs not granted when posture disabled
    set:
      features:
        posture:
          cluster_posture:
            enabled: false
      cluster:
        additional_settings:
          kspm_collector:
            ocp_deploymentconfig_enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - notContains:
          path: rules
          content:
            apiGroups:
              - apps.openshift.io
            resources:
              - deploymentconfigs

  - it: Posture OCP routes and deploymentconfigs both enabled
    set:
      features:
        posture:
          cluster_posture:
            enabled: true
      cluster:
        additional_settings:
          kspm_collector:
            ocp_route_enabled: true
            ocp_deploymentconfig_enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - contains:
          path: rules
          content:
            apiGroups:
              - route.openshift.io
            resources:
              - routes
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps.openshift.io
            resources:
              - deploymentconfigs
            verbs:
              - get
              - list
              - watch

  - it: When posture is disabled OCP routes and deploymentconfigs both disabled
    set:
      features:
        posture:
          cluster_posture:
            enabled: false
      cluster:
        additional_settings:
          kspm_collector:
            ocp_route_enabled: true
            ocp_deploymentconfig_enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-cluster
      - notContains:
          path: rules
          content:
            apiGroups:
              - route.openshift.io
            resources:
              - routes
      - notContains:
          path: rules
          content:
            apiGroups:
              - apps.openshift.io
            resources:
              - deploymentconfigs
