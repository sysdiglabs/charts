suite: Host - ServiceAccount
templates:
  - templates/host/serviceaccount.yaml
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Renders the ServiceAccount by default
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: release-name-shield-host
      - equal:
          path: metadata.namespace
          value: shield-namespace

  - it: host.rbac.create false renders no ServiceAccount
    set:
      host:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: host.rbac.service_account.create false suppresses only the ServiceAccount
    set:
      host:
        rbac:
          service_account:
            create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: host.rbac.service_account.create true overrides rbac.create false
    set:
      host:
        rbac:
          create: false
          service_account:
            create: true
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: release-name-shield-host

  - it: Honors host.rbac.service_account_name override
    set:
      host:
        rbac:
          service_account_name: my-existing-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-existing-sa

  - it: Applies rbac.labels and rbac.annotations to the ServiceAccount
    set:
      host:
        rbac:
          labels:
            app.kubernetes.io/name: shield
          annotations:
            app.kubernetes.io/description: "This is a test"
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: shield
      - isSubset:
          path: metadata.annotations
          content:
            app.kubernetes.io/description: "This is a test"
