suite: Host - ClusterRole
templates:
  - templates/host/clusterrole.yaml
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Does not create the ClusterRole when rbac.create is false
    set:
      host:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Creates the ClusterRole with baseline rules by default
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: release-name-shield-host
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - notContains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list

  - it: Adds posture/VM RBAC rules when host_posture is enabled
    set:
      features:
        posture:
          host_posture:
            enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - flowcontrol.apiserver.k8s.io
            resources:
              - flowschemas
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/exec
            verbs:
              - create
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list

  - it: Adds posture/VM RBAC rules when host_vulnerability_management is enabled
    set:
      features:
        vulnerability_management:
          host_vulnerability_management:
            enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/exec
            verbs:
              - create

  - it: Adds OpenShift-specific rules when OpenShift API is detected and posture is enabled
    capabilities:
      apiVersions:
        - security.openshift.io/v1
    set:
      features:
        posture:
          host_posture:
            enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - operator.openshift.io
            resources:
              - kubeapiservers
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - config.openshift.io
            resources:
              - oauths
              - apiservers
              - networks
              - images
            verbs:
              - get
              - list

  - it: Adds OpenShift-specific rules when extra_capabilities_api_versions declares the OpenShift API
    set:
      features:
        posture:
          host_posture:
            enabled: true
      extra_capabilities_api_versions:
        - security.openshift.io/v1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - config.openshift.io
            resources:
              - oauths
              - apiservers
              - networks
              - images
            verbs:
              - get
              - list

  - it: Does not add OpenShift rules when OpenShift API is detected but posture/VM are disabled
    capabilities:
      apiVersions:
        - security.openshift.io/v1
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list
      - notContains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list

  - it: Propagates custom labels and annotations onto the ClusterRole
    set:
      host:
        rbac:
          labels:
            app.kubernetes.io/name: shield
          annotations:
            app.kubernetes.io/description: "This is a test"
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: shield
      - isSubset:
          path: metadata.annotations
          content:
            app.kubernetes.io/description: "This is a test"
