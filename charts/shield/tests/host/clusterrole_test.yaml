suite: Host - ClusterRole
templates:
  - templates/host/clusterrole.yaml
release:
  name: release-name
  namespace: shield-namespace
values:
  - ../values/base.yaml
tests:
  - it: Does not create the ClusterRole when rbac.create is false
    set:
      host:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: host.rbac.cluster_role.create false suppresses the ClusterRole even when rbac.create is true
    set:
      host:
        rbac:
          cluster_role:
            create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: host.rbac.cluster_role.create true overrides rbac.create false
    set:
      host:
        rbac:
          create: false
          cluster_role:
            create: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: release-name-shield-host

  - it: Creates the ClusterRole with baseline rules by default
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: release-name-shield-host
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - notContains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list

  - it: Grants endpointslices for network topology
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - discovery.k8s.io
            resources:
              - endpointslices
            verbs:
              - get
              - list
              - watch

  - it: Adds posture RBAC rules when host_posture is enabled
    set:
      features:
        posture:
          host_posture:
            enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - flowcontrol.apiserver.k8s.io
            resources:
              - flowschemas
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/exec
            verbs:
              - create
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list

  - it: Does not add posture RBAC rules when only host_vulnerability_management is enabled
    set:
      features:
        posture:
          host_posture:
            enabled: false
        vulnerability_management:
          host_vulnerability_management:
            enabled: true
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/exec
            verbs:
              - create

  - it: Adds OpenShift-specific rules when OpenShift API is detected and posture is enabled
    capabilities:
      apiVersions:
        - security.openshift.io/v1
    set:
      features:
        posture:
          host_posture:
            enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - operator.openshift.io
            resources:
              - kubeapiservers
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - config.openshift.io
            resources:
              - oauths
              - apiservers
              - networks
              - images
            verbs:
              - get
              - list

  - it: Adds OpenShift-specific rules when extra_capabilities_api_versions declares the OpenShift API
    set:
      features:
        posture:
          host_posture:
            enabled: true
      extra_capabilities_api_versions:
        - security.openshift.io/v1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list
      - contains:
          path: rules
          content:
            apiGroups:
              - config.openshift.io
            resources:
              - oauths
              - apiservers
              - networks
              - images
            verbs:
              - get
              - list

  - it: Does not add OpenShift rules when OpenShift API is detected but posture is disabled
    capabilities:
      apiVersions:
        - security.openshift.io/v1
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resources:
              - securitycontextconstraints
            verbs:
              - get
              - list
      - notContains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
            verbs:
              - list

  - it: Default values do not grant nodes/proxy
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - nodes/proxy
            verbs:
              - get
              - list
              - watch

  - it: live_logs enabled grants nodes/proxy
    set:
      features:
        investigations:
          live_logs:
            enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - nodes/proxy
            verbs:
              - get
              - list
              - watch

  - it: live_logs disabled does not grant nodes/proxy
    set:
      features:
        investigations:
          live_logs:
            enabled: false
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - nodes/proxy
            verbs:
              - get
              - list
              - watch

  - it: Propagates custom labels and annotations onto the ClusterRole
    set:
      host:
        rbac:
          labels:
            app.kubernetes.io/name: shield
          annotations:
            app.kubernetes.io/description: "This is a test"
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: shield
      - isSubset:
          path: metadata.annotations
          content:
            app.kubernetes.io/description: "This is a test"
